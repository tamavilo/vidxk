<!DOCTYPE html>
<html>
<head>
<title>Buat Artikel</title>
<style>
  /* RESET */
  * {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c44);
    padding: 20px;
    color: #fff;
  }

  /* CARD FORM */
  .form-card {
    max-width: 420px;
    margin: auto;
    background: #1f1f33;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, .4);
    animation: fadeUp .6s ease;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .form-card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 20px;
  }

  /* INPUT */
  .form-group {
    margin-bottom: 15px;
  }

  .form-group label {
    font-size: 13px;
    opacity: .8;
    display: block;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #2a2a45;
    color: #fff;
    transition: .3s;
  }

  .form-group input:focus {
    background: #32325a;
    box-shadow: 0 0 0 2px #4f7cff;
  }

  /* PREVIEW */
  .preview {
    text-align: center;
    margin-top: 10px;
  }

  .preview img {
    max-width: 100%;
    border-radius: 10px;
    display: none;
  }

  /* BUTTON */
  button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #4f7cff, #6a9cff);
    color: #fff;
    transition: .3s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(79, 124, 255, .4);
  }

  /* INFO */
  #info {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
  }

  /* RESPONSIVE */
  @media(max-width:480px) {
    .form-card {
      padding: 20px;
    }
  }
</style>
</head>
<body>

<div class="form-card">
  <h2>📥 Post VIDEO</h2>

  <form id="dataForm">
    <div class="form-group">
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Judul / Nama" required>
    </div>

    <div class="form-group">
      <label>URL Video</label>
      <input type="text" id="video" placeholder="https://video.mp4" required>
    </div>

    <button type="submit">Simpan Data</button>
  </form>

  <div id="info"></div>
</div>

<!-- <button onclick="savePost()">Publish</button> -->

<script src="script.js"></script>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzD8Q9gXUBUkI7jwzwgjc22CwSeeOb5QS0GRVLHcXu_tSG-DJb0SL7nI4_yh7FZ_mKU/exec";

  const form = document.getElementById("dataForm");
  const info = document.getElementById("info");


  /* Submit Form */
  form.addEventListener("submit", e => {
    e.preventDefault();
    savePost();
    info.innerHTML = "⏳ Menyimpan data...";

    const data = {
      video: document.getElementById("video").value
    }

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    })
      .then(res => res.json())
      .then(res => {
        if (res.status === "success") {
          info.innerHTML = `✅ Berhasil disimpan (ID: <b>${res.id}</b>)`;
          form.reset();
          imgPreview.style.display = "none";
        } else {
          info.innerHTML = "❌ Gagal menyimpan data";
        }
      })
      .catch(() => {
        info.innerHTML = "❌ Koneksi error";
      });
  });
</script>

</body>
</html>
